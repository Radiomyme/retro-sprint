<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Rétro Sprint Pokémon</title>
<link rel="stylesheet" href="/styles/css-pokemon-gameboy.css">
<style>
@font-face{font-family:'PokemonGB';src:url('/assets/fonts/Pokemon-GB.ttf')}
@font-face{font-family:'PressStart2P';src:url('/assets/fonts/PressStart2P-Regular.ttf')}
:root{--bg:#f8f3f8;--green:#30d848;--orange:#f8c830;--red:#f03030}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'PokemonGB',monospace;touch-action:none;user-select:none}
img{image-rendering:pixelated}

#select-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#0a0a1a,#0f1a3e 40%,#1a2a5e);display:flex;flex-direction:column;align-items:center;justify-content:center}
#select-screen h1{font-size:14px;color:#FFD93D;text-shadow:2px 2px 0 #c0392b;margin-bottom:6px;text-align:center;line-height:1.6}
#select-screen h2{font-size:9px;color:#ccc;margin-bottom:16px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;width:92%;max-width:460px;margin-bottom:16px}
.pcard{background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 4px;cursor:pointer;text-align:center;transition:.15s}
.pcard.sel{border-color:var(--c);background:rgba(255,255,255,.1);transform:scale(1.05)}
.pcard img{width:48px;height:48px}
.pcard .n{font-size:9px;color:#fff;margin-top:3px}
.pcard .p{font-size:7px;color:var(--c);margin-top:2px}
.sact{display:flex;flex-direction:column;align-items:center;gap:6px}
.sact label{font-size:8px;color:#888;display:flex;align-items:center;gap:5px}
.sact input{width:14px;height:14px;accent-color:#c0392b}
.gobtn{font-size:11px;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:18px;padding:10px 26px;cursor:pointer}
.gobtn:disabled{opacity:.4}

#game-screen{position:fixed;inset:0;display:none;background:#48a058}
#game-screen.active{display:block}
#viewport{position:absolute;top:0;left:0;width:100%;bottom:110px;overflow:hidden;background:#48a058}
#map-container{position:absolute;transition:transform .15s linear}
#map-bg{display:block}
.psp{position:absolute;z-index:10;transition:left .15s steps(4,end),top .15s steps(4,end)}
.psp.me{z-index:15}
.psp img{image-rendering:pixelated}
.plbl{position:absolute;font-size:7px;color:#fff;text-shadow:1px 1px 0 #000,-1px 1px 0 #000;white-space:nowrap;text-align:center;bottom:100%;left:50%;transform:translateX(-50%)}

#bottom-panel{position:absolute;bottom:0;left:0;width:100%;display:flex;flex-direction:column}
#text-box{background:var(--bg);padding:6px 10px;font-size:11px;color:#181010;line-height:1.5;min-height:40px;display:none;border-image:url('/styles/images/frame.png') 7 round;border-width:7px;border-style:solid}
.choice-btn{font-family:inherit;font-size:9px;padding:3px 8px;border:2px solid #181010;border-radius:3px;background:var(--bg);cursor:pointer}
#controls{height:110px;display:flex;justify-content:space-between;align-items:center;padding:6px 16px;background:#2a2a40}
.dpad{width:90px;height:90px;position:relative}
.dbtn{position:absolute;width:30px;height:30px;background:rgba(20,20,40,.9);border:2px solid rgba(80,80,110,.5);display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(200,200,220,.8);cursor:pointer;border-radius:3px}
.dbtn:active{background:rgba(80,80,120,.95);color:#fff}
.dbtn.up{top:0;left:30px}.dbtn.down{bottom:0;left:30px}.dbtn.left{top:30px;left:0}.dbtn.right{top:30px;right:0}
.dpc{position:absolute;top:30px;left:30px;width:30px;height:30px;background:rgba(15,15,35,.9)}
.ab{display:flex;gap:8px;align-items:center}
.abb{width:44px;height:44px;border-radius:50%;font-size:13px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.abb:active{transform:scale(.9)}
.ba{background:linear-gradient(180deg,#e74c3c,#b03030)}
.bb{background:linear-gradient(180deg,#3a3a8a,#2a2a6a)}
.mbtn{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.mb{font-size:6px;color:rgba(160,160,180,.7);background:rgba(40,40,60,.8);border:1px solid rgba(80,80,100,.3);border-radius:8px;padding:3px 10px;cursor:pointer}

#hud{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;padding:3px 6px;background:linear-gradient(180deg,rgba(0,0,0,.55),transparent);z-index:20;gap:4px;font-size:7px;color:#fff}
#hud img{width:18px;height:18px}
.hb{font-size:7px;background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:5px;padding:2px 6px;cursor:pointer;font-family:inherit}
.hd{width:7px;height:7px;border-radius:50%;border:1px solid rgba(255,255,255,.3)}

/* ═══ BATTLE (canvas-based, mobile-first) ═══ */
#battle-overlay{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;background:#000}
#battle-overlay.active{display:flex}
#battle-canvas{flex:1;display:block;image-rendering:pixelated;min-height:0}
#battle-ui{display:flex;background:var(--bg);height:38%;max-height:220px;border-image:url('/styles/images/frame.png') 7 round;border-width:7px;border-style:solid}
#battle-msg{flex:1;font-size:11px;padding:6px 8px;display:flex;align-items:flex-start;line-height:1.4;overflow:hidden}
#battle-moves{width:50%;display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--bg);border-left:3px solid #b8b0a0}
#battle-moves button{font-size:9px;font-family:'PokemonGB',monospace;padding:6px 5px;background:var(--bg);border:1px solid #e0d8c8;color:#181010;cursor:pointer;text-align:left;line-height:1.2;min-height:44px;display:flex;flex-direction:column;justify-content:center}
#battle-moves button:active{background:#d8d0c0}
.move-pp{display:block;font-size:6px;color:#888;margin-top:2px}
@media(max-width:420px){
  #battle-ui{height:42%;max-height:260px}
  #battle-msg{font-size:9px;padding:5px 6px}
  #battle-moves button{font-size:8px;padding:5px 4px;min-height:40px}
  .move-pp{font-size:5px}
}
@media(min-width:700px){
  #battle-ui{height:30%;max-height:200px}
  #battle-msg{font-size:14px;padding:10px 16px}
  #battle-moves button{font-size:11px;padding:8px}
}


.bstr,.bstl{position:absolute;inset:0}
.bstr{background:repeating-linear-gradient(0deg,transparent 0%,transparent 5%,#000 5%,#000 10%);transform:translateX(100%);animation:bsl 1.2s linear forwards}
.bstl{background:repeating-linear-gradient(0deg,#000 0%,#000 5%,transparent 5%,transparent 10%);transform:translateX(-100%);animation:bsr 1.2s linear forwards}
@keyframes bsl{to{transform:translateX(0)}}
@keyframes bsr{to{transform:translateX(0)}}

#battle-scene{flex:1;position:relative;background:linear-gradient(180deg,#78b8e8 0%,#a0d0f0 38%,#68a848 38%,#508838 100%);overflow:hidden}
.bi{position:absolute;z-index:5;background:var(--bg);border-image:url('/styles/images/frame.png') 7 round;border-width:5px;border-style:solid;padding:2px 5px}
.bi.en{top:3%;left:2%}.bi.pl{bottom:3%;right:2%}
.bn{font-size:10px;color:#303030;text-transform:uppercase}.blv{font-size:9px;color:#606060;margin-left:6px}
.bhp{position:relative;margin-top:1px}.bhp img{height:6px;display:block}
.bhpi{position:absolute;top:23%;right:1.5%;width:75.2%;height:46%}
.bhpf{height:100%;transition:width .8s ease-out}
.bht{font-size:7px;color:#303030;text-align:right;margin-top:1px}

.bs{position:absolute;z-index:2}
.bs.en{top:5%;right:10%;width:22%;max-width:100px}
.bs.pl{bottom:6%;left:5%;width:28%;max-width:130px}
.bs img{width:100%;display:block}
.bs.si img{animation:sfl 1.3s linear forwards}
.bs.pl.si img{animation:sfr 1.3s linear forwards}
@keyframes sfl{from{transform:translateX(-500%)}to{transform:translateX(0)}}
@keyframes sfr{from{transform:translateX(500%)}to{transform:translateX(0)}}
.bs.atkr img{animation:ar .5s linear}
.bs.atkl img{animation:al .5s linear}
@keyframes ar{0%,100%{transform:translateX(0)}50%{transform:translateX(50%)}}
@keyframes al{0%,100%{transform:translateX(0)}50%{transform:translateX(-50%)}}
.bs.fl img{animation:fla .5s linear}
@keyframes fla{0%{opacity:1}10%{opacity:0}20%{opacity:1}30%{opacity:0}40%{opacity:1}50%{opacity:0}60%{opacity:1}70%{opacity:0}80%{opacity:1}90%{opacity:0}100%{opacity:1}}

#battle-bottom{position:relative;height:20%;min-height:56px}
#battle-text{position:absolute;inset:0;background:var(--bg);border-image:url('/styles/images/frame.png') 7 round;border-width:7px;border-style:solid;padding:5px 8px;font-size:11px;color:#181010;display:flex;align-items:flex-start}
#battle-menu{position:absolute;right:0;top:0;bottom:0;width:44%;display:none;grid-template-columns:1fr 1fr;background:var(--bg);border-image:url('/styles/images/frame.png') 7 round;border-width:7px;border-style:solid;z-index:5}
#battle-menu.show{display:grid}
#battle-menu button{font-size:9px;font-family:'PokemonGB',monospace;padding:3px 4px;background:transparent;border:none;color:#181010;cursor:pointer;text-align:left}
#battle-menu button:active{background:#d8d0c0}

.overlay-panel{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;background:rgba(0,0,0,.92);font-family:'PokemonGB',monospace}
.overlay-panel.open{display:flex}
.oph{padding:8px;display:flex;align-items:center;gap:6px;border-bottom:2px solid rgba(255,255,255,.08)}
.opb{font-size:12px;background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:5px;cursor:pointer}
.opt{font-size:10px;flex:1}
.opbd{flex:1;overflow-y:auto;padding:8px}
.opc{background:rgba(255,255,255,.06);border-radius:6px;padding:6px 8px;margin-bottom:5px;border-left:3px solid var(--ac)}
.opc .oa{font-size:7px;color:var(--ac);margin-bottom:2px;display:flex;align-items:center;gap:4px}
.opc .oa img{width:14px;height:14px}
.opc .ot{font-size:8px;color:#ddd;line-height:1.5}
.opi{padding:6px;background:rgba(0,0,0,.5);border-top:2px solid rgba(255,255,255,.06);display:flex;gap:5px}
.opi input{flex:1;font-size:10px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:6px 12px;color:#fff;outline:none;font-family:inherit}
.opi button{font-size:14px;background:var(--zc);color:#000;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer}
.ap{background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #c0392b;border-radius:10px;padding:14px;width:90%;max-width:320px;max-height:80vh;overflow-y:auto}
.ap h3{font-size:10px;color:#c0392b;text-align:center;margin-bottom:10px}
.ap button{font-size:8px;width:100%;margin-bottom:3px;padding:7px 8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#ccc;cursor:pointer;text-align:left;font-family:inherit}
.ap .sep{border-top:1px solid rgba(255,255,255,.06);margin:6px 0}
</style>
</head>
<body>
<div id="select-screen"></div>
<div id="game-screen">
  <div id="viewport"><div id="map-container"><img id="map-bg" src="/assets/map/pewter-city.png"></div></div>
  <div id="hud"></div>
  <div id="bottom-panel">
    <div id="text-box"></div>
    <div id="controls">
      <div class="dpad"><div class="dpc"></div><div class="dbtn up" data-dir="up">▲</div><div class="dbtn down" data-dir="down">▼</div><div class="dbtn left" data-dir="left">◀</div><div class="dbtn right" data-dir="right">▶</div></div>
      <div class="ab"><div class="abb bb" id="btn-b">B</div><div class="abb ba" id="btn-a">A</div></div>
      <div class="mbtn"><div class="mb" id="btn-select">SELECT</div><div class="mb" id="btn-start">START</div></div>
    </div>
  </div>
</div>
<div id="battle-overlay">
  <div id="transition-overlay"></div>
  <canvas id="battle-canvas"></canvas>
  <div id="battle-ui">
    <div id="battle-msg" class="framed neutral"></div>
    <div id="battle-moves"></div>
  </div>
</div>
<div id="zone-panel" class="overlay-panel"></div>
<div id="vote-panel" class="overlay-panel"></div>
<div id="admin-panel" class="overlay-panel" style="align-items:center;justify-content:center"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/game.js"></script>
</body>
</html>
